<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Spendrift">
	<title>Spendrift</title>
	<defs>
		<linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#34d399" />
			<stop offset="100%" stop-color="#059669" />
		</linearGradient>
	</defs>
	<!-- Rounded emerald tile -->
	<rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g)" />
	<!-- Three ascending bars (spend → save → drift) -->
	<rect x="15" y="38" width="7" height="14" rx="1.5" fill="#022c22" fill-opacity="0.82" />
	<rect x="28.5" y="29" width="7" height="23" rx="1.5" fill="#022c22" fill-opacity="0.9" />
	<rect x="42" y="20" width="7" height="32" rx="1.5" fill="#022c22" />
	<!-- Upward drift accent -->
	<path d="M14 24 L24 16 L32 21 L50 9"
		stroke="#022c22"
		stroke-width="2.5"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
		opacity="0.9" />
	<circle cx="50" cy="9" r="2.5" fill="#022c22" />
</svg>